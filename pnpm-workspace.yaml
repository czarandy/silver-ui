packages:
  - site

allowBuilds:
  esbuild: true
  unrs-resolver: true

# First-party package (github.com/czarandy/eslint-plugin-use-client); exempt it
# from the minimum-release-age supply-chain gate so freshly published versions
# can be adopted immediately.
minimumReleaseAgeExclude:
  - eslint-plugin-use-client

overrides:
  esbuild: 0.28.1

patchedDependencies:
  jsx-ast-utils-x@0.1.0: patches/jsx-ast-utils-x@0.1.0.patch
