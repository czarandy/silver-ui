<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1ca49e" />
    <title>silver-ui | themeable React component library</title>
    <meta
      name="description"
      content="silver-ui is a comprehensive, themeable React component library built with Panda CSS. CSS-variable theming, dark mode, and React 19 support." />
    <link rel="canonical" href="https://silver-ui.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="silver-ui" />
    <meta property="og:url" content="https://silver-ui.com/" />
    <meta
      property="og:title"
      content="silver-ui | themeable React component library" />
    <meta
      property="og:description"
      content="A comprehensive, themeable React component library built with Panda CSS. CSS-variable theming, dark mode, and React 19 support." />
    <meta property="og:image" content="https://silver-ui.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="silver-ui — a themeable React component library" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="silver-ui | themeable React component library" />
    <meta
      name="twitter:description"
      content="A comprehensive, themeable React component library built with Panda CSS. CSS-variable theming, dark mode, and React 19 support." />
    <meta name="twitter:image" content="https://silver-ui.com/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Load fonts without blocking render: preload the stylesheet, then apply it
      on load by flipping the media from "print" to "all".
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      media="print"
      onload="this.media = 'all'" />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" />
    </noscript>

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "silver-ui",
        "description": "A comprehensive, themeable React component library built with Panda CSS. CSS-variable theming, dark mode, and React 19 support.",
        "url": "https://silver-ui.com/",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "softwareRequirements": "React 19",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "license": "https://opensource.org/licenses/MIT",
        "codeRepository": "https://github.com/czarandy/silver-ui",
        "author": {
          "@type": "Person",
          "name": "Andrey Goder",
          "url": "https://github.com/czarandy"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
