name: Publish to npm

# Publishes when a GitHub Release is published (the local scripts/release.sh
# driver creates that release). Authenticates to npm via OIDC "trusted
# publishing" — no token or secret. npm verifies the request came from this
# repo's publish.yml workflow (configured on the package's npm settings page)
# and mints a short-lived credential. Provenance is generated automatically.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6

      # Use the pnpm version pinned in package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1, newer than the npm
      # bundled with Node 22. Upgrade the global npm used for the publish step.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Re-run the same gates the local driver ran, on a clean checkout.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm exec publint
      - run: node scripts/package-smoke-test.mjs

      # Sanity check: the tag being released must match package.json's version,
      # so a mistagged release can never publish the wrong version.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Pre-releases go to the 'next' dist-tag so `npm install pkg` never grabs
      # them by default; stable releases go to 'latest'. No NODE_AUTH_TOKEN:
      # OIDC trusted publishing handles auth, and provenance is automatic.
      - name: Publish
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
